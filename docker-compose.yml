version: "3"

services:
  qq-bot:
    build: .
    restart: always
    environment:
      - LLM_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./data:/app/data

  llonebot:
    image: ghcr.io/nonebot/llonebot:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - QQ_ACCOUNT=${QQ_ACCOUNT}
      - QQ_PASSWORD=${QQ_PASSWORD}
      - QQ_PROTOCOL=android

  comfyui:
    image: ai-dock/comfyui:latest
    ports:
      - "8188:8188"
    volumes:
      - ./models/comfyui/unet:/opt/ComfyUI/models/unet
      - ./models/comfyui/clip:/opt/ComfyUI/models/clip
      - ./models/comfyui/vae:/opt/ComfyUI/models/vae
      - ./data/comfyui_output:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  comfyui_models: