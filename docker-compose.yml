version: "3"

services:
  qq-bot:
    build: .
    restart: always
    environment:
      - LLM_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - ./data:/app/data

  llonebot:
    image: ghcr.io/nonebot/llonebot:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - QQ_ACCOUNT=${QQ_ACCOUNT}
      - QQ_PASSWORD=${QQ_PASSWORD}
      - QQ_PROTOCOL=android